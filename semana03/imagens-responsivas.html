<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemento Picture</title>
</head>
<body>
    <main>
    <div class="principal">
        <picture>

            <source
                media="(min-width: 500px)"
                srcset="imagens/principal">

            <source
                media="(min-width: 1000px)"
                srcset="imagens/principal-grande">

            <img
                src="imagens/principal-pequena.webp"
                alt="Templo de Belém"
                width="1500"
                height="750">
        </picture>
    </div>
</main>
</body>
</html>
